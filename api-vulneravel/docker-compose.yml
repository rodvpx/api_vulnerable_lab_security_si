version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: lab_db
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: lab_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "80:8080"
    depends_on:
      - postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/lab_db
      - SPRING_DATASOURCE_USERNAME=lab_user
      - SPRING_DATASOURCE_PASSWORD=lab_password

volumes:
  pgdata: