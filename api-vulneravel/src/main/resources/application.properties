spring.application.name=vulnerable-api
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lab_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lab_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lab_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.springframework.web=DEBUG
logging.level.com.security.lab=DEBUG